syntax = "proto3";

package steemvm.steembridge.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "steemvm/steembridge/v1/params.proto";

option go_package = "steemvm/x/steembridge/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // SubmitSteemDeposit defines the SubmitSteemDeposit RPC.
  rpc SubmitSteemDeposit(MsgSubmitSteemDeposit) returns (MsgSubmitSteemDepositResponse);

  // BridgeOut defines the BridgeOut RPC.
  rpc BridgeOut(MsgBridgeOut) returns (MsgBridgeOutResponse);

  // SubmitNameRegistration defines the SubmitNameRegistration RPC.
  rpc SubmitNameRegistration(MsgSubmitNameRegistration) returns (MsgSubmitNameRegistrationResponse);

  // ConfirmName defines the ConfirmName RPC.
  rpc ConfirmName(MsgConfirmName) returns (MsgConfirmNameResponse);
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "steemvm/x/steembridge/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgSubmitSteemDeposit defines the MsgSubmitSteemDeposit message.
message MsgSubmitSteemDeposit {
  option (cosmos.msg.v1.signer) = "validator";
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string txid = 2;
  uint32 op_index = 3;
  uint64 steem_block = 4;
  string steem_timestamp = 5;
  string steem_sender = 6;
  string gateway_account = 7;
  uint64 amount_millisteem = 8;
  string memo = 9;
}

// MsgSubmitSteemDepositResponse defines the MsgSubmitSteemDepositResponse message.
message MsgSubmitSteemDepositResponse {}

// MsgBridgeOut defines the MsgBridgeOut message.
message MsgBridgeOut {
  option (cosmos.msg.v1.signer) = "sender";
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string destination_steem_account = 2;
  string amount_asteem = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string memo = 4;
}

// MsgBridgeOutResponse defines the MsgBridgeOutResponse message.
message MsgBridgeOutResponse {}

// MsgSubmitNameRegistration is a bonded validator's attestation that a Steem
// account sent a qualifying transfer to the gateway requesting a name link.
message MsgSubmitNameRegistration {
  option (cosmos.msg.v1.signer) = "validator";
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string txid = 2;
  uint32 op_index = 3;
  uint64 steem_block = 4;
  string steem_timestamp = 5;
  // steem_account is the Steem-side sender — the name being linked.
  string steem_account = 6;
  string gateway_account = 7;
  uint64 amount_millisteem = 8;
  string memo = 9;
}

// MsgSubmitNameRegistrationResponse defines the MsgSubmitNameRegistrationResponse message.
message MsgSubmitNameRegistrationResponse {}

// MsgConfirmName is signed by the memo-derived destination address to accept
// a name registration that has reached the validator confirmation threshold.
message MsgConfirmName {
  option (cosmos.msg.v1.signer) = "confirmer";
  string confirmer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 registration_id = 2;
}

// MsgConfirmNameResponse defines the MsgConfirmNameResponse message.
message MsgConfirmNameResponse {}
