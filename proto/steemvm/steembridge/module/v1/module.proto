syntax = "proto3";
package steemvm.steembridge.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "steemvm/x/steembridge/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "steemvm/x/steembridge"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
