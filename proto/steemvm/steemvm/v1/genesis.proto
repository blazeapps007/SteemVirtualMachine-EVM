syntax = "proto3";
package steemvm.steemvm.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "steemvm/steemvm/v1/params.proto";

option go_package = "steemvm/x/steemvm/types";

// GenesisState defines the steemvm module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
