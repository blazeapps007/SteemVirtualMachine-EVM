# SteemVM reverse proxy — a TLS-terminating front end for the node's HTTP/WS
# RPC endpoints. Put this at /etc/nginx/conf.d/steemvm.conf (or
# /etc/nginx/sites-available/steemvm with a symlink into sites-enabled), replace
# the example.com domains with your own, then obtain certificates with certbot
# (see section 12 of README.md).
#
# Backends are the ports docker-compose.yml publishes on the host:
#   8545  EVM JSON-RPC (HTTP)               -> evm.<domain>
#   8546  EVM JSON-RPC (WebSocket)          -> evm-ws.<domain>
#   26657 CometBFT RPC (HTTP + /websocket)  -> rpc.<domain>
#   1317  Cosmos REST API (LCD)             -> api.<domain>
#   9090  gRPC (optional; see note below)   -> grpc.<domain>
# The CometBFT p2p port (26656) is a raw protocol, NOT HTTP — never proxy it;
# expose it directly (firewalled to the p2p network).
#
# These server blocks listen on :80 only. Running `certbot --nginx` (README §12)
# rewrites each one in place to add the `listen 443 ssl` block and an HTTP->HTTPS
# redirect, and wires in the Let's Encrypt certificate — you do not edit TLS here.
#
# HARDENING: once this proxy is up, bind the compose port mappings to localhost
# (e.g. "127.0.0.1:8545:8545" in docker-compose.yml) so the plaintext backends
# are reachable only by nginx, and only 443 is exposed to the internet.

# WebSocket upgrade helper: emits `Connection: upgrade` only when the client
# actually requested an upgrade, `close` otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shared per-client-IP rate limit for all RPC vhosts. Tune to your capacity.
limit_req_zone $binary_remote_addr zone=steemvm_rpc:10m rate=25r/s;

# Reusable proxy headers. Included by each location below.
# (Kept inline rather than in a separate file so this config is self-contained.)

# ---------------------------------------------------------------------------
# EVM JSON-RPC (HTTP)  ->  https://evm.example.com   (MetaMask "New RPC URL")
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name evm.example.com;

    client_max_body_size 2m;   # JSON-RPC batches; raise if you send big batches

    location / {
        limit_req zone=steemvm_rpc burst=50 nodelay;

        proxy_pass http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# EVM JSON-RPC (WebSocket)  ->  wss://evm-ws.example.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name evm-ws.example.com;

    location / {
        proxy_pass http://127.0.0.1:8546;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-lived subscriptions alive
        proxy_send_timeout 3600s;
    }
}

# ---------------------------------------------------------------------------
# CometBFT RPC (HTTP + /websocket)  ->  https://rpc.example.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name rpc.example.com;

    client_max_body_size 2m;

    location / {
        limit_req zone=steemvm_rpc burst=50 nodelay;

        proxy_pass http://127.0.0.1:26657;
        proxy_http_version 1.1;
        # /websocket subscriptions need the upgrade headers; harmless on plain HTTP.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}

# ---------------------------------------------------------------------------
# Cosmos REST API / LCD  ->  https://api.example.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 2m;

    location / {
        limit_req zone=steemvm_rpc burst=50 nodelay;

        proxy_pass http://127.0.0.1:1317;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# gRPC (optional)  ->  https://grpc.example.com
# ---------------------------------------------------------------------------
# gRPC needs HTTP/2, so TLS must already be terminated here — unlike the blocks
# above, certbot --nginx cannot bootstrap an http2 grpc vhost from a :80 stub.
# Enable this ONLY after a cert exists for grpc.example.com (obtain one with
# `certbot certonly --nginx -d grpc.example.com`), and only after setting
# Instructions/app.toml [grpc] address = "0.0.0.0:9090" (it binds to localhost by
# default, so the published 9090 port is otherwise unreachable). Then uncomment:
#
# server {
#     listen 443 ssl;
#     http2 on;
#     server_name grpc.example.com;
#
#     ssl_certificate     /etc/letsencrypt/live/grpc.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/grpc.example.com/privkey.pem;
#     include             /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
#
#     location / {
#         grpc_pass grpc://127.0.0.1:9090;
#     }
# }
